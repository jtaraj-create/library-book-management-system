<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Library Book Management System</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">
        <div class="card shadow-sm border-danger">
          <div class="card-body p-4">
            <h2 class="text-danger mb-2">Delete Book</h2>
            <p class="text-muted mb-4">Are you sure you want to remove this book?</p>

            <div class="book-info-box mb-4">
              <p><strong>Title:</strong> <span id="infoTitle"></span></p>
              <p><strong>Book ID:</strong> <span id="infoId"></span></p>
              <p><strong>Author:</strong> <span id="infoAuthor"></span></p>
              <p><strong>Category:</strong> <span id="infoCategory"></span></p>
              <p class="mb-0"><strong>Status:</strong> <span id="infoStatus"></span></p>
            </div>

            <div class="d-flex justify-content-end gap-2">
              <a href="index.html" class="btn btn-secondary">Cancel</a>
              <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete Book</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="scripts/delete-book.js"></script>
</body>
</html>
