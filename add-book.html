<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Library Book Management System</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="mb-2">Add Book</h2>
            <p class="text-muted mb-4">Enter the book details below.</p>

            <form id="addBookForm">
              <div class="mb-3">
                <label for="bookTitle" class="form-label">Book Title</label>
                <input type="text" class="form-control" id="bookTitle" required>
              </div>

              <div class="mb-3">
                <label for="bookAuthor" class="form-label">Author</label>
                <input type="text" class="form-control" id="bookAuthor" required>
              </div>

              <div class="mb-3">
                <label for="bookCategory" class="form-label">Category</label>
                <input type="text" class="form-control" id="bookCategory" required>
              </div>

              <div class="mb-4">
                <label for="bookStatus" class="form-label">Status</label>
                <select class="form-select" id="bookStatus" required>
                  <option value="Available">Available</option>
                  <option value="Borrowed">Borrowed</option>
                </select>
              </div>

              <div class="d-flex justify-content-end gap-2">
                <a href="index.html" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Book</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="scripts/add-book.js"></script>
</body>
</html>
